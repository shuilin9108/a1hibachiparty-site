<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Book A1 Hibachi Party Online | Outdoor Hibachi Catering Booking</title>
<meta name="description" content="Book A1 Hibachi Party online for private outdoor hibachi catering across NYC, Long Island, Westchester, New Jersey, Connecticut, and Pennsylvania." />
<link rel="canonical" href="https://www.a1hibachiparty.com/book-online.html" />

<meta property="og:title" content="Book A1 Hibachi Party Online" />
<meta property="og:description" content="Submit your A1 Hibachi Party booking request online for outdoor hibachi catering, birthdays, backyard parties, and private events." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://www.a1hibachiparty.com/book-online.html" />
<meta property="og:image" content="https://www.a1hibachiparty.com/assets/logos/logo-banner-wide-dark.png" />

<link rel="icon" href="assets/logos/logo-favicon.png" />
<link rel="stylesheet" href="style.css" />

<style>
html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: #fff;
  overflow-x: hidden;
}

.booking-page-wrap {
  background: #fff;
  color: #111;
  min-height: 100vh;
}

.booking-frame-shell {
  width: 100%;
  height: calc(100vh - 146px);
  min-height: 760px;
  background: #fff;
  overflow: hidden;
}

.booking-frame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #fff;
}

.booking-fallback {
  display: none;
  padding: 14px 18px;
  text-align: center;
  background: #fff5f5;
  border-bottom: 1px solid rgba(220,38,38,.18);
  color: #111;
  font-weight: 700;
}

.booking-fallback a {
  color: #dc2626;
  font-weight: 900;
}

@media (max-width: 768px) {
  .booking-frame-shell {
    height: calc(100vh - 126px);
    min-height: 720px;
  }
}
</style>
</head>

<body class="booking-page-wrap">

<div class="topbar">
  Outdoor Hibachi Catering · NYC · Long Island · Westchester · New Jersey · Connecticut · Pennsylvania
</div>

<nav class="navbar">
  <div class="logo">
    <a href="index.html">
      <img src="assets/logos/logo-main.png" alt="A1 Hibachi Party logo" class="site-logo" />
    </a>
  </div>

  <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">☰</button>

  <div class="menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="book-online.html">Book Online</a>
    <a href="menu.html">Menu</a>
    <a href="cities.html">Cities</a>
    <a href="gallery.html">Gallery</a>
    <a href="faq.html">FAQ</a>
    <a href="contact.html">Contact</a>
  </div>

  <a href="https://booking.hibachifinder.com/a1hibachiparty" target="_blank" rel="noopener noreferrer" class="nav-btn">Open Full Page</a>
</nav>

<div class="booking-fallback">
  If the booking form does not load, open it directly here:
  <a href="https://booking.hibachifinder.com/a1hibachiparty" target="_blank" rel="noopener noreferrer">A1 Hibachi Party Booking</a>
</div>

<main class="booking-frame-shell">
  <iframe
    class="booking-frame"
    src="https://booking.hibachifinder.com/a1hibachiparty"
    title="A1 Hibachi Party Online Booking"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allow="clipboard-write; payment"
  ></iframe>
</main>

<script>
const menuToggle = document.getElementById("menuToggle");
const mobileMenu = document.getElementById("mobileMenu");

if (menuToggle && mobileMenu) {
  menuToggle.addEventListener("click", () => {
    mobileMenu.classList.toggle("menu-open");
    const expanded = mobileMenu.classList.contains("menu-open");
    menuToggle.setAttribute("aria-expanded", expanded ? "true" : "false");
  });
}
</script>

</body>
</html>
